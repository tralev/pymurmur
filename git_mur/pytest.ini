[pytest]
markers =
    slow: performance and scaling tests (run on PR merge or nightly)
    gl: tests requiring ModernGL GPU context
    gpu: tests requiring GPU context (alias for gl)
    golden: golden trajectory regression tests
    guard: P14 guard-rail tests (architecture, docs, golden, config drift, collection count)
    numba: tests requiring numba JIT
    pygame: tests requiring pygame event loop
    e2e: end-to-end integration tests
    integration: tests wiring multiple modules together
