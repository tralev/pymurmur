# field_lava_lamp.yaml — Phase 3 field mode preset
# Pure blob dynamics — no Reynolds separation/alignment/cohesion,
# driven entirely by shell forces, chase, and flow noise.
# Roadmap ref: P3.10 preset table (N=16K, chase=0, no sep/align/coh)

# ── Domain ──────────────────────────────────────────────────────────
domain:
  width: 1000.0
  height: 700.0
  depth: 400.0

# ── Flock ───────────────────────────────────────────────────────────
flock:
  num_boids: 16000
  # v0: (default) — Reynolds cruise speed not used in pure blob mode
  boid_size: 4.0

# ── Mode ────────────────────────────────────────────────────────────
mode: field

# ── Field Parameters ────────────────────────────────────────────────
field:
  # Reynolds forces disabled (pure blob):
  field_separation: 0.0
  field_alignment: 0.0
  field_cohesion: 0.0
  field_chase_strength: 0.0
  # Blob dynamics only:
  field_flow: 0.35
  noise: 0.04
  shell_influence: 1.0    # pure shell radial force
  target_pull: 0.15
  tangent_pull: 0.04
  wave_gain: 0.03
  inertia: 0.78
  drift_pull: 0.08

# ── Extensions ──────────────────────────────────────────────────────
extensions:
  wander_enabled: true
  predator_enabled: false
  ripple_enabled: true

wander:
  attractor_speed: 0.10
  attractor_radius: 300.0

# ── Seed ────────────────────────────────────────────────────────────
seed: 42

# ── Boundary Mode ───────────────────────────────────────────────────
boundary_mode: sphere

# ── Performance ─────────────────────────────────────────────────────
performance:
  spatial_index: none

# ── Metrics ─────────────────────────────────────────────────────────
metrics:
  detail_level: 1
  interval: 60
