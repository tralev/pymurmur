# field_silk_sheet.yaml — Phase 3 field mode preset
# Thin planar — birds spread in a wide, flat sheet with minimal
# vertical extent, like a silk fabric rippling in wind.
# Roadmap ref: P3.10 preset table (N=14K, v0=0.46, sep=0.92, align=1.10, coh=1.10, chase=0.68)

# ── Domain ──────────────────────────────────────────────────────────
# Wide, shallow domain encourages planar spreading
domain:
  width: 1400.0
  height: 200.0         # thin vertical extent
  depth: 900.0

# ── Flock ───────────────────────────────────────────────────────────
flock:
  num_boids: 14000
  v0: 0.46
  boid_size: 4.0
  position_init: gaussian   # TODO P3.10: switch to position_init: blob when blob init lands

# ── Mode ────────────────────────────────────────────────────────────
mode: field

# ── Field Parameters ────────────────────────────────────────────────
field:
  field_separation: 0.92
  field_alignment: 1.10
  field_cohesion: 1.10
  field_chase_strength: 0.68
  # Thin planar — strong horizontal alignment, weak vertical drift
  noise: 0.025
  field_flow: 0.22
  target_pull: 0.20
  drift_pull: 0.14
  drift_direction: [0.40, 0.02, 0.12]  # mostly horizontal drift
  tangent_pull: 0.03
  inertia: 0.86
  shell_influence: 0.75
  wave_gain: 0.035

# ── Extensions ──────────────────────────────────────────────────────
extensions:
  wander_enabled: true
  predator_enabled: false
  ripple_enabled: true

wander:
  attractor_speed: 0.09
  attractor_radius: 350.0

# ── Seed ────────────────────────────────────────────────────────────
seed: 42

# ── Boundary Mode ───────────────────────────────────────────────────
boundary_mode: sphere

# ── Performance ─────────────────────────────────────────────────────
performance:
  spatial_index: none

# ── Metrics ─────────────────────────────────────────────────────────
metrics:
  detail_level: 1
  interval: 60
