# field_ink_cloud.yaml — Phase 3 field mode preset
# Dense, accumulation trails — large cohesive flock with strong
# chase blending for layered motion trails.
# Roadmap ref: P3.10 preset table (N=18K, v0=0.62, sep=0.92, align=0.90, coh=1.80, chase=0.82)

# ── Domain ──────────────────────────────────────────────────────────
domain:
  width: 1000.0
  height: 700.0
  depth: 400.0

# ── Flock ───────────────────────────────────────────────────────────
flock:
  num_boids: 18000
  v0: 0.62
  boid_size: 4.0

# ── Mode ────────────────────────────────────────────────────────────
mode: field

# ── Field Parameters ────────────────────────────────────────────────
field:
  field_separation: 0.92
  field_alignment: 0.90
  field_cohesion: 1.80
  field_chase_strength: 0.82
  # Dense accumulation — strong chase pull, multi-group layering
  noise: 0.035
  field_flow: 0.30
  target_pull: 0.22
  drift_pull: 0.12
  shell_influence: 0.85
  tangent_pull: 0.035
  wave_gain: 0.04
  inertia: 0.82
  # Multi-group leader/chaser for layered trails:
  num_groups: 7
  leader_fraction: 0.16

# ── Extensions ──────────────────────────────────────────────────────
extensions:
  wander_enabled: true
  predator_enabled: false
  ripple_enabled: true

wander:
  attractor_speed: 0.12
  attractor_radius: 350.0

# ── Seed ────────────────────────────────────────────────────────────
seed: 42

# ── Boundary Mode ───────────────────────────────────────────────────
boundary_mode: sphere

# ── Performance ─────────────────────────────────────────────────────
performance:
  spatial_index: none

# ── Metrics ─────────────────────────────────────────────────────────
metrics:
  detail_level: 1
  interval: 60
