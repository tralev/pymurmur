# field_predator_ripple.yaml — Phase 3 field mode preset
# Orbit threat + waves — predator-driven ripple envelopes pulse
# through the flock as it orbits the threat agent.
# Roadmap ref: P3.10 preset table (N=12K, v0=0.78, sep=1.05, align=1.05, coh=1.15, chase=0.64)

# ── Domain ──────────────────────────────────────────────────────────
domain:
  width: 1000.0
  height: 700.0
  depth: 400.0

# ── Flock ───────────────────────────────────────────────────────────
flock:
  num_boids: 12000
  v0: 0.78
  boid_size: 4.0

# ── Mode ────────────────────────────────────────────────────────────
mode: field

# ── Field Parameters ────────────────────────────────────────────────
field:
  field_separation: 1.05
  field_alignment: 1.05
  field_cohesion: 1.15
  field_chase_strength: 0.64
  # Predator-driven — strong ripple, moderate wander, panic-ready speed
  noise: 0.04
  field_flow: 0.28
  target_pull: 0.18
  drift_pull: 0.10
  tangent_pull: 0.04
  wave_gain: 0.06         # stronger ripple pulses
  ripple_trains: 4
  inertia: 0.80
  shell_influence: 0.80

# ── Extensions ──────────────────────────────────────────────────────
extensions:
  wander_enabled: true
  predator_enabled: true   # orbit threat
  ripple_enabled: true     # density waves

wander:
  attractor_speed: 0.14
  attractor_radius: 400.0

predator:
  predator_threat_radius: 80.0
  predator_strength: 1.2
  predator_momentum: 0.6

# ── Seed ────────────────────────────────────────────────────────────
seed: 42

# ── Boundary Mode ───────────────────────────────────────────────────
boundary_mode: sphere

# ── Performance ─────────────────────────────────────────────────────
performance:
  spatial_index: none

# ── Metrics ─────────────────────────────────────────────────────────
metrics:
  detail_level: 1
  interval: 60
