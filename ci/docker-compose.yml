# ci/docker-compose.yml — multi-profile test orchestration
# Usage:
#   docker compose -f ci/docker-compose.yml --profile fast up --build
#   docker compose -f ci/docker-compose.yml --profile slow up
#   docker compose -f ci/docker-compose.yml -f ci/docker-compose.gpu.yml --profile gpu up

services:
  # ── Profile: fast (default — runs on every commit) ──
  # PYTHON_VERSION lets CI's 3.11/3.12 matrix build this one service twice
  # (docker compose build --build-arg or `PYTHON_VERSION=3.11 docker compose …`)
  # without touching the single-version pymurmur-test:latest image the
  # other fast-profile services (test-guards, test-subsystems) share.
  test-fast:
    build:
      context: ..
      dockerfile: ci/Dockerfile
      args:
        PYTHON_VERSION: ${PYTHON_VERSION:-3.12}
    image: pymurmur-test:py${PYTHON_VERSION:-3.12}
    profiles: [fast]
    command: >
      pytest test/ -v
      -m "not slow and not gl and not gpu and not pygame"
      --timeout=60
      --tb=short
      --junitxml=output/test-results-fast.xml
      --cov=pymurmur
      --cov-report=xml:output/coverage-fast.xml
      --cov-report=term
    volumes:
      - ../output:/app/output
      - ../conf:/app/conf:ro       # read-only configs
    environment:
      - PYMURMUR_TEST=1

  # ── Profile: e2e (end-to-end CLI tests) ──
  test-e2e:
    build:
      context: ..
      dockerfile: ci/Dockerfile
    image: pymurmur-test:latest
    profiles: [e2e, full]
    command: >
      pytest test/ -m e2e
      -v --timeout=120 --tb=long
      --junitxml=output/test-results-e2e.xml
    volumes:
      - ../output:/app/output
      - ../conf:/app/conf:ro
    environment:
      - PYMURMUR_TEST=1
      - PYMURMUR_CONFIG_DIR=/app/conf

  # ── Profile: slow (performance, scaling — runs on PR merge / nightly) ──
  test-slow:
    build:
      context: ..
      dockerfile: ci/Dockerfile
    image: pymurmur-test:latest
    profiles: [slow, full]
    command: >
      sh -c "
        pip install --no-cache-dir 'stable-baselines3>=2.0' 2>/dev/null || true;
        pytest test/ -v -m 'slow and not gl and not gpu'
        --timeout=600
        --tb=long
        --junitxml=output/test-results-slow.xml
        --durations=20
      "
    volumes:
      - ../output:/app/output
      - ../conf:/app/conf:ro
    environment:
      - PYMURMUR_TEST=1
      - NUMBA_NUM_THREADS=4

  # ── Profile: gpu (all @gl-marked tests — renderer/capture/visual) ──
  test-gpu:
    build:
      context: ..
      dockerfile: ci/Dockerfile.gpu
    image: pymurmur-test-gpu:latest
    profiles: [gpu, full]
    command: >
      pytest test/ -m "gl or gpu"
      -v --timeout=120 --tb=long
      --junitxml=output/test-results-gpu.xml
    volumes:
      - ../output:/app/output
      - ../conf:/app/conf:ro
    environment:
      - PYMURMUR_TEST=1
      # Allow software rendering if no real GPU
      - LIBGL_ALWAYS_SOFTWARE=1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # ── Profile: guards (architecture / drift / golden / mode-switch — every commit) ──
  test-guards:
    build:
      context: ..
      dockerfile: ci/Dockerfile
    image: pymurmur-test:latest
    profiles: [fast, full]
    command: >
      pytest test/ -m guard
      -v --timeout=60 --tb=short
      --junitxml=output/test-results-guards.xml
    volumes:
      - ../output:/app/output
      - ../conf:/app/conf:ro

  # ── Profile: capture (llvmpipe GIF smoke — exercises CAPTURE_* env overrides) ──
  capture:
    build:
      context: ..
      dockerfile: ci/Dockerfile.gpu
    image: pymurmur-test-gpu:latest
    profiles: [capture, full]
    command: python -m pymurmur --config field --no-viz --capture
    volumes:
      - ../output:/app/output
      - ../conf:/app/conf:ro
    environment:
      - LIBGL_ALWAYS_SOFTWARE=1
      # D16: __main__.py reads CAPTURE_WIDTH/CAPTURE_HEIGHT (not _W/_H)
      - CAPTURE_WIDTH=400
      - CAPTURE_HEIGHT=300
      - CAPTURE_FRAMES=120
      - CAPTURE_OUT=output/ci_capture.gif

  # ── Profile: fast+full (subsystem isolation + import guard tests) ──
  test-subsystems:
    build:
      context: ..
      dockerfile: ci/Dockerfile
    image: pymurmur-test:latest
    profiles: [fast, full]
    command: >
      pytest test/l3_subsystems/ test/crosscutting/guards/test_imports.py
      -v --timeout=60 --tb=short
      --junitxml=output/test-results-subsystems.xml
    volumes:
      - ../output:/app/output
      - ../conf:/app/conf:ro

  # ── Profile: lint (static analysis) ──
  lint:
    build:
      context: ..
      dockerfile: ci/Dockerfile
    image: pymurmur-test:latest
    profiles: [lint, full]
    command: >
      sh -c "
        pip install ruff mypy && 
        ruff check pymurmur/ test/ &&
        mypy pymurmur/ --ignore-missing-imports
      "
    volumes:
      - ../conf:/app/conf:ro
