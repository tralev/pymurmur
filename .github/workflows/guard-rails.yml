name: P14 Guard Rails

on:
  push:
    branches:
      - main
    paths-ignore:
      - '*.md'
      - conf/**
      - output/**
      - sci/**
      - docs/**
      - LICENSE
      - .github/**
  pull_request:
    branches:
      - main
  schedule:
    - cron: '0 4 * * *'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  guard-rail-dag:
    name: P14.1 — Architecture DAG matrix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build fast image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ci/Dockerfile
          tags: pymurmur-test:latest
          load: true
          cache-from: type=gha,scope=fast-py3.12
          cache-to: type=gha,mode=max,scope=fast-py3.12
      - name: Run architecture DAG enforcement (in Docker)
        run: |
          mkdir -p output
          docker run --rm -v ${{ github.workspace }}/output:/app/output \
            pymurmur-test:latest \
            pytest test/crosscutting/guards/test_architecture.py \
              -v --tb=long --timeout=60 \
              --junitxml=output/guard-dag.xml
      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: guard-results-dag
          path: output/guard-dag.xml

  guard-rail-golden:
    name: P0.1+P13.5 — Golden trajectories & determinism
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build fast image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ci/Dockerfile
          tags: pymurmur-test:latest
          load: true
          cache-from: type=gha,scope=fast-py3.12
          cache-to: type=gha,mode=max,scope=fast-py3.12
      - name: Run golden trajectory regression (in Docker)
        run: |
          mkdir -p output
          docker run --rm -v ${{ github.workspace }}/output:/app/output \
            pymurmur-test:latest \
            pytest test/crosscutting/guards/test_golden.py \
              -v --tb=long --timeout=120 \
              --junitxml=output/guard-golden.xml
      - name: Run determinism matrix (in Docker)
        run: |
          docker run --rm -v ${{ github.workspace }}/output:/app/output \
            pymurmur-test:latest \
            pytest test/crosscutting/guards/test_determinism.py \
              -v --tb=long --timeout=300 \
              --junitxml=output/guard-determinism.xml
      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: guard-results-golden
          path: output/guard-golden.xml
      - name: Upload determinism results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: guard-results-determinism
          path: output/guard-determinism.xml

  guard-rail-config-drift:
    name: P14.2 — Config-usage drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build fast image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ci/Dockerfile
          tags: pymurmur-test:latest
          load: true
          cache-from: type=gha,scope=fast-py3.12
          cache-to: type=gha,mode=max,scope=fast-py3.12
      - name: Run config-usage drift scan (in Docker)
        run: |
          docker run --rm pymurmur-test:latest \
            pytest test/crosscutting/guards/test_config_drift.py \
              -v --tb=long --timeout=60

  guard-rail-3d:
    name: P14.3 — Strictly-3D guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build fast image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ci/Dockerfile
          tags: pymurmur-test:latest
          load: true
          cache-from: type=gha,scope=fast-py3.12
          cache-to: type=gha,mode=max,scope=fast-py3.12
      - name: Run strictly-3D guard (in Docker)
        run: |
          docker run --rm pymurmur-test:latest \
            pytest test/crosscutting/guards/test_strictly_3d.py \
              -v --tb=long --timeout=60

  guard-rail-doc-links:
    name: P14.4 — Doc-link validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build fast image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ci/Dockerfile
          tags: pymurmur-test:latest
          load: true
          cache-from: type=gha,scope=fast-py3.12
          cache-to: type=gha,mode=max,scope=fast-py3.12
      - name: Run doc-link validation (in Docker)
        run: |
          mkdir -p output
          docker run --rm -v ${{ github.workspace }}/output:/app/output \
            pymurmur-test:latest \
            pytest test/crosscutting/guards/test_docs.py \
              -v --tb=long --timeout=30 \
              --junitxml=output/guard-doc-links.xml
      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: guard-results-doc-links
          path: output/guard-doc-links.xml

  guard-rail-collection-count:
    name: P14.5 — Collection-count guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build fast image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ci/Dockerfile
          tags: pymurmur-test:latest
          load: true
          cache-from: type=gha,scope=fast-py3.12
          cache-to: type=gha,mode=max,scope=fast-py3.12
      - name: Run collection-count guard (in Docker)
        run: |
          docker run --rm pymurmur-test:latest \
            pytest test/crosscutting/guards/test_collection_count.py \
              -v --tb=long --timeout=60

  guard-rail-composers:
    name: G1 — Composer-enforcement (no dead L0 atoms)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build fast image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ci/Dockerfile
          tags: pymurmur-test:latest
          load: true
          cache-from: type=gha,scope=fast-py3.12
          cache-to: type=gha,mode=max,scope=fast-py3.12
      - name: Run composer-enforcement guard (in Docker)
        run: |
          mkdir -p output
          docker run --rm -v ${{ github.workspace }}/output:/app/output \
            pymurmur-test:latest \
            pytest test/crosscutting/guards/test_composers.py \
              -v --tb=long --timeout=60 \
              --junitxml=output/guard-composers.xml
      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: guard-results-composers
          path: output/guard-composers.xml

  guard-rail-mypy:
    name: P8.0 — Mypy type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build fast image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ci/Dockerfile
          tags: pymurmur-test:latest
          load: true
          cache-from: type=gha,scope=fast-py3.12
          cache-to: type=gha,mode=max,scope=fast-py3.12
      - name: Run mypy (in Docker)
        run: |
          docker run --rm pymurmur-test:latest \
            sh -c "pip install --no-cache-dir mypy && mypy pymurmur/ --ignore-missing-imports"

  guard-rail-evolved:
    name: P0.16 — Evolved artifact validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build fast image
        # ci/Dockerfile bakes output/evolved.yaml at build time (P0.16),
        # so no separate generation step is needed here.
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ci/Dockerfile
          tags: pymurmur-test:latest
          load: true
          cache-from: type=gha,scope=fast-py3.12
          cache-to: type=gha,mode=max,scope=fast-py3.12
      - name: Validate evolved.yaml artifact (in Docker)
        run: |
          mkdir -p output
          docker run --rm -v ${{ github.workspace }}/output:/app/output \
            pymurmur-test:latest \
            pytest test/l0_modules/analysis/test_evolved_yaml.py \
              -v --tb=long --timeout=30 \
              --junitxml=output/guard-evolved.xml
      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: guard-results-evolved
          path: output/guard-evolved.xml

  guard-rails-summary:
    name: All guard rails
    needs:
      - guard-rail-dag
      - guard-rail-golden
      - guard-rail-config-drift
      - guard-rail-3d
      - guard-rail-doc-links
      - guard-rail-collection-count
      - guard-rail-mypy
      - guard-rail-evolved
      - guard-rail-composers
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all guards passed
        run: |
          echo "Checking guard rail results..."
          echo "  DAG:               ${{ needs.guard-rail-dag.result }}"
          echo "  Golden:            ${{ needs.guard-rail-golden.result }}"
          echo "  Config drift:      ${{ needs.guard-rail-config-drift.result }}"
          echo "  Strictly-3D:       ${{ needs.guard-rail-3d.result }}"
          echo "  Doc links:         ${{ needs.guard-rail-doc-links.result }}"
          echo "  Mypy:              ${{ needs.guard-rail-mypy.result }}"
          echo "  Evolved artifact:  ${{ needs.guard-rail-evolved.result }}"
          echo "  Collection count:  ${{ needs.guard-rail-collection-count.result }}"
          echo "  Composers:         ${{ needs.guard-rail-composers.result }}"

          FAILED=0
          for job in "${{ needs.guard-rail-dag.result }}" \
                     "${{ needs.guard-rail-golden.result }}" \
                     "${{ needs.guard-rail-config-drift.result }}" \
                     "${{ needs.guard-rail-3d.result }}" \
                     "${{ needs.guard-rail-doc-links.result }}" \
                     "${{ needs.guard-rail-mypy.result }}" \
                     "${{ needs.guard-rail-evolved.result }}" \
                     "${{ needs.guard-rail-collection-count.result }}" \
                     "${{ needs.guard-rail-composers.result }}"; do
            if [ "$job" = "failure" ] || [ "$job" = "cancelled" ]; then
              FAILED=$((FAILED + 1))
            fi
          done

          if [ $FAILED -gt 0 ]; then
            echo "❌ $FAILED guard rail(s) failed — blocking merge"
            exit 1
          fi

          echo "✓ All 9 guard rails passed"
