name: P14 Guard Rails
true:
  push:
    branches:
    - main
    paths-ignore:
    - '*.md'
    - conf/**
    - output/**
    - sci/**
    - docs/**
    - LICENSE
    - .github/**
  pull_request:
    branches:
    - main
  schedule:
  - cron: 0 4 * * *
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  guard-rail-dag:
    name: P14.1 — Architecture DAG matrix
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install deps
      run: pip install numpy scipy PyYAML pytest pytest-timeout
    - name: Run architecture DAG enforcement
      run: "mkdir -p output\nif [ -f test/l4_crosscutting/guards/test_architecture.py ]; then\n  pytest test/l4_crosscutting/guards/test_architecture.py \\\n    -v --tb=long\
        \ --timeout=60 \\\n    --junitxml=output/guard-dag.xml\nelse\n  echo \"⚠️  test/l4_crosscutting/guards/test_architecture.py not yet implemented\
        \ (P0.2 → P14.1)\"\n  echo \"    Running minimal import-regression check instead...\"\n  pytest test/l4_crosscutting/guards/test_imports.py\
        \ \\\n    -v --tb=long --timeout=60 \\\n    --junitxml=output/guard-dag.xml\nfi\n"
    - name: Upload results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: guard-results-dag
        path: output/guard-dag.xml
    - name: Check for stale old-scheme identifiers
      run: '! grep -rn "\bS[1-7]\.[A-Z]\|\bT[0-6]\b\|\bD[0-9]\b" pymurmur/ test/ conf/ scripts/ --include="*.py" --include="*.yaml"
        --include="*.yml" 2>/dev/null | grep -v "__pycache__" | grep -v "migration-reference" | grep -v "sci/" | grep -v "roadmap.md"
        || (echo "STALE IDENTIFIERS FOUND" && false)'
  guard-rail-golden:
    name: P0.1+P13.5 — Golden trajectories & determinism
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Check golden files exist
      run: 'python3 -c "import os; modes=[''projection'',''spatial'',''field'',''vicsek'',''influencer'']; missing=[m for
        m in modes if not os.path.exists(f''test/data/golden_{m}.npz'')]; assert not missing, f''Missing golden files: {missing}''"'
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install deps
      run: 'pip install numpy scipy PyYAML pytest pytest-timeout

        pip install numba

        '
    - name: Check golden files exist
      run: 'python3 -c "import os; modes=[''projection'',''spatial'',''field'',''vicsek'',''influencer'']; missing=[m for
        m in modes if not os.path.exists(f''test/data/golden_{m}.npz'')]; assert not missing, f''Missing golden files: {missing}'';
        print(f''All {len(modes)} golden files present'')"'
    - name: Run golden trajectory regression
      run: "mkdir -p output\nif [ -f test/l4_crosscutting/guards/test_golden.py ]; then\n  pytest test/l4_crosscutting/guards/test_golden.py \\\n    -v --tb=long --timeout=120\
        \ \\\n    --junitxml=output/guard-golden.xml\nelse\n  echo \"⚠️  test/l4_crosscutting/guards/test_golden.py not yet implemented (P0.1)\"\n\
        \  echo \"    Skipping golden regression — no tests to run.\"\nfi\n"
    - name: Run determinism matrix
      run: |
        if [ -f test/l4_crosscutting/guards/test_determinism.py ]; then
          pytest test/l4_crosscutting/guards/test_determinism.py \
            -v --tb=long --timeout=300 \
            --junitxml=output/guard-determinism.xml
        else
          echo "⚠️  test/l4_crosscutting/guards/test_determinism.py not yet implemented (P13.5)"
          echo "    Running basic determinism smoke test instead..."
          # Fallback: two in-process runs with same seed
          python3 << 'PYEOF'
        import sys; sys.path.insert(0, '.')
        import numpy as np
        from pymurmur.core.config import SimConfig
        from pymurmur.simulation.engine import SimulationEngine
        cfg = SimConfig()
        cfg.flock.num_boids = 15
        cfg.seed = 42
        cfg.mode = "projection"
        e1 = SimulationEngine(cfg)
        e2 = SimulationEngine(cfg)
        for _ in range(30):
            e1.step(1/60)
            e2.step(1/60)
        np.testing.assert_array_equal(e1.flock.positions, e2.flock.positions)
        print("✓ Determinism smoke test passed — same seed → bit-identical")
        PYEOF
        fi
    - name: Upload results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: guard-results-golden
        path: output/guard-golden.xml
    - name: Upload determinism results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: guard-results-determinism
        path: output/guard-determinism.xml
  guard-rail-config-drift:
    name: P14.2 — Config-usage drift
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install deps
      run: pip install numpy scipy PyYAML
    - name: Run config-usage drift scan
      run: |
        if [ -f test/l4_crosscutting/guards/test_config_drift.py ]; then
          pip install pytest pytest-timeout
          pytest test/l4_crosscutting/guards/test_config_drift.py -v --tb=long --timeout=60
        else
          echo "⚠️  test/l4_crosscutting/guards/test_config_drift.py not yet implemented (P14.2)"
          echo "    Running inline config-usage drift scan..."
          python3 << 'PYEOF'
        """P14.2 — Config-usage drift detection (inline fallback).

        Scans non-config modules for attribute-access chains that
        reach each SimConfig leaf field (e.g. cfg.flock.num_boids,
        config.projection.phi_p).  Fields without any such access
        are reported as orphans.
        """
        import ast, re, sys
        from pathlib import Path

        CONFIG_FILE = Path("pymurmur/core/config.py")
        if not CONFIG_FILE.exists():
            print("⚠️  config.py not found — skipping drift scan")
            sys.exit(0)

        # 1. Extract all leaf field names and their parent dataclass.
        # Scoped per-class (not a shared stack over ast.walk's flat,
        # non-block-scoped traversal) so a field is never misattributed
        # to whichever class happened to be visited last.
        config_tree = ast.parse(CONFIG_FILE.read_text())
        field_parents: dict[str, str] = {}  # field_name → parent_class

        for node in ast.walk(config_tree):
            if not isinstance(node, ast.ClassDef):
                continue
            is_dataclass = any(
                (isinstance(dec, ast.Name) and dec.id == "dataclass") or
                (isinstance(dec, ast.Attribute) and dec.attr == "dataclass")
                for dec in node.decorator_list
            )
            if not is_dataclass:
                continue
            for item in node.body:
                if isinstance(item, ast.AnnAssign) and isinstance(item.target, ast.Name):
                    field_parents[item.target.id] = node.name

        if not field_parents:
            print("⚠️  No config fields found — skipping")
            sys.exit(0)

        print(f"Found {len(field_parents)} config fields across dataclasses")

        # 2. For each field, search non-config modules for plausible
        #    attribute-access chains like `cfg.<parent>.<field>` or
        #    `config.<parent>.<field>` or `<parent>.<field>`.
        accessed: set[str] = set()
        for py_file in Path("pymurmur").rglob("*.py"):
            if "config.py" in str(py_file):
                continue
            text = py_file.read_text()
            for field, parent in field_parents.items():
                lower_parent = parent.lower()
                found = False
                # Pattern A: ParentClass.field (e.g. FlockConfig.num_boids)
                if re.search(rf"\b{parent}\.{field}\b", text):
                    found = True
                # Pattern B: lower_parent.field (e.g. flock.num_boids)
                elif re.search(rf"\b{lower_parent}\.{field}\b", text):
                    found = True
                # Pattern C: cfg/config.lower_parent + .field in same file
                elif re.search(rf"\.{field}\b", text) and \
                     re.search(rf"(?:cfg|config)\s*\.\s*{lower_parent}\b", text):
                    found = True
                # Pattern D: SimConfig's own fields accessed as config.field
                if not found and parent == "SimConfig":
                    if re.search(rf"(?:cfg|config)\s*\.\s*{field}\b", text):
                        found = True
                if found:
                    accessed.add(field)

        # 3. Report orphans
        orphans = set(field_parents) - accessed
        if orphans:
            print(f"CONFIG-USAGE DRIFT DETECTED ({len(orphans)} orphan fields):")
            for field in sorted(orphans):
                parent = field_parents[field]
                print(f"  • {parent}.{field} — defined but never accessed outside config.py")
            sys.exit(1)

        print(f"✓ All {len(field_parents)} config fields have at least one access site")
        PYEOF
        fi
  guard-rail-3d:
    name: P14.3 — Strictly-3D guard
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install deps
      run: pip install numpy
    - name: Run strictly-3D guard
      run: "python3 << 'PYEOF'\n\"\"\"P14.3 — Strictly-3D guard.\n\nFails if any .py file under pymurmur/physics/ uses a 2D\n\
        spatial array shape.  Uses targeted regex patterns to avoid\nfalse positives from innocent uses of the integer 2.\n\
        \"\"\"\nimport re\nimport sys\nfrom pathlib import Path\n\nPHYSICS_DIR = Path(\"pymurmur/physics\")\nFAILURES: list[str]\
        \ = []\n\n# Patterns that indicate a 2D spatial array (not false positives):\n#   np.zeros((N, 2))     — explicit\
        \ 2D init\n#   np.empty((N, 2))     — explicit 2D init\n#   .reshape(-1, 2)      — reshape to 2 columns\n#   shape=(N,\
        \ 2)         — shape annotation\n#   positions[:, :2]     — slicing to first 2 columns only\n#   (…, 2) in docstrings\
        \ / comments\nPATTERNS = [\n    (r\"np\\.(?:zeros|ones|empty|full|random\\.[a-z_]+)\\(\\s*\\(\\s*[^,)]+\\s*,\\s*2\\\
        s*\\)\",\n     \"numpy array init with (…, 2) shape\"),\n    (r\"\\.reshape\\s*\\(\\s*[^,)]+\\s*,\\s*2\\s*\\)\",\n\
        \     \"reshape to 2 columns (e.g. .reshape(N, 2) or .reshape(-1, 2))\"),\n    (r\"shape\\s*=\\s*\\(\\s*[^,)]+\\s*,\\\
        s*2\\s*\\)\",\n     \"shape=(…, 2) annotation\"),\n    (r\"\\[:,?\\s*:2\\]|\\[:2\\]\",\n     \"position slicing to\
        \ first 2 columns ([:,:2] or [:2]; excludes stride-only [::2])\"),\n    (r\"\\(N,\\s*2\\)\",\n     \"doc/comment reference\
        \ to (N,2) shape\"),\n]\n\nfor py_file in sorted(PHYSICS_DIR.rglob(\"*.py\")):\n    text = py_file.read_text()\n \
        \   lines = text.split(\"\\n\")\n    for lineno, line in enumerate(lines, start=1):\n        for pattern, description\
        \ in PATTERNS:\n            if re.search(pattern, line):\n                FAILURES.append(\n                    f\"\
        {py_file}:{lineno}: {description}\\n    {line.strip()}\"\n                )\n\n# Check depth validation in DomainConfig\n\
        config_py = Path(\"pymurmur/core/config.py\")\nif config_py.exists():\n    text = config_py.read_text()\n    if \"\
        depth\" in text:\n        has_validation = any(\n            phrase in text\n            for phrase in [\"depth >\
        \ 0\", \"depth <= 0\", \"depth < 0\",\n                           \"depth <= 0.0\", \"depth > 0.0\",\n           \
        \                \"domain.depth > 0\", \"domain.depth <= 0\"]\n        )\n        if not has_validation:\n       \
        \     FAILURES.append(\n                \"core/config.py: depth field has no positivity validation\"\n           \
        \ )\n\nif FAILURES:\n    print(f\"STRICTLY-3D GUARD FAILED ({len(FAILURES)} issues):\")\n    for f in FAILURES:\n\
        \        print(f\"  • {f}\")\n    sys.exit(1)\n\nprint(\"✓ Strictly-3D guard passed — no 2D array shapes in physics/\"\
        )\nPYEOF\n"
  guard-rail-doc-links:
    name: P14.4 — Doc-link validation
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install deps
      run: pip install pytest pytest-timeout PyYAML
    - name: Run doc-link validation
      run: "mkdir -p output\npytest test/l4_crosscutting/guards/test_docs.py \\\n  -v --tb=long --timeout=30 \\\n  --junitxml=output/guard-doc-links.xml\n"
    - name: Upload results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: guard-results-doc-links
        path: output/guard-doc-links.xml
  guard-rail-collection-count:
    name: P14.5 — Collection-count guard
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install deps
      run: pip install numpy scipy PyYAML pytest pytest-timeout
    - name: Run collection-count guard
      run: "# If the dedicated test exists, run it.\n# Otherwise, assert a known minimum count per subpackage\n# so that a\
        \ catastrophic collection failure (e.g. 0 tests)\n# is caught immediately.\nif [ -f test/l4_crosscutting/guards/test_collection_count.py\
        \ ]; then\n  pytest test/l4_crosscutting/guards/test_collection_count.py -v --tb=long --timeout=60\nelse\n  echo \"=== Collection-count minimums\
        \ ===\"\n  # Fast suite (no markers)\n  fast_count=$(python3 -m pytest test/ -q -m \"not slow and not gl\" \\\n  \
        \  --collect-only 2>&1 | grep 'selected' | grep -oP '\\d+(?= tests)')\n  echo \"  Fast tests collected: ${fast_count}\"\
        \n  if [ \"${fast_count:-0}\" -lt 400 ]; then\n    echo \"ERROR: fewer than 400 fast tests collected — suspected regression\"\
        \n    exit 1\n  fi\n  # Doc tests\n  doc_count=$(python3 -m pytest test/l4_crosscutting/guards/test_docs.py --collect-only -q 2>&1 \\\n \
        \   | grep 'selected' | grep -oP '\\d+(?= tests)')\n  echo \"  Doc tests collected:  ${doc_count}\"\n  if [ \"${doc_count:-0}\"\
        \ -lt 2 ]; then\n    echo \"ERROR: fewer than 2 doc-drift tests collected\"\n    exit 1\n  fi\n  echo \"✓ Collection-count\
        \ minimums satisfied\"\nfi\n"
  guard-rail-composers:
    name: G1 — Composer-enforcement (no dead L0 atoms)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install deps
      run: pip install numpy scipy PyYAML pytest pytest-timeout
    - name: Run composer-enforcement guard
      run: "mkdir -p output\npytest test/l4_crosscutting/guards/test_composers.py \\\n  -v --tb=long --timeout=60 \\\n  --junitxml=output/guard-composers.xml\n"
    - name: Upload results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: guard-results-composers
        path: output/guard-composers.xml
  guard-rail-mypy:
    name: P8.0 — Mypy type-check
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install deps
      run: pip install mypy numpy scipy PyYAML
    - name: Run mypy
      run: mypy pymurmur/ --ignore-missing-imports
  guard-rail-evolved:
    name: P0.16 — Evolved artifact validation
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install deps
      run: pip install numpy scipy PyYAML pytest pytest-timeout
    - name: Generate evolved.yaml artifact
      run: "mkdir -p output\npython3 scripts/generate_evolved_artifact.py\n"
    - name: Validate evolved.yaml artifact
      run: "pytest test/l3_modules/analysis/test_evolved_yaml.py \\\n  -v --tb=long --timeout=30 \\\n  --junitxml=output/guard-evolved.xml\n"
    - name: Upload results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: guard-results-evolved
        path: output/guard-evolved.xml
  guard-rails-summary:
    name: All guard rails
    needs:
    - guard-rail-dag
    - guard-rail-golden
    - guard-rail-config-drift
    - guard-rail-3d
    - guard-rail-doc-links
    - guard-rail-collection-count
    - guard-rail-mypy
    - guard-rail-evolved
    - guard-rail-composers
    runs-on: ubuntu-latest
    if: always()
    steps:
    - name: Check all guards passed
      run: "echo \"Checking guard rail results...\"\necho \"  DAG:               ${{ needs.guard-rail-dag.result }}\"\necho\
        \ \"  Golden:            ${{ needs.guard-rail-golden.result }}\"\necho \"  Config drift:      ${{ needs.guard-rail-config-drift.result\
        \ }}\"\necho \"  Strictly-3D:       ${{ needs.guard-rail-3d.result }}\"\necho \"  Doc links:         ${{ needs.guard-rail-doc-links.result\
        \ }}\"\necho \"  Mypy:              ${{ needs.guard-rail-mypy.result }}\"\necho \"  Evolved artifact:  ${{ needs.guard-rail-evolved.result }}\"\necho \"  Collection count:  ${{ needs.guard-rail-collection-count.result }}\"\necho \"  Composers:         ${{ needs.guard-rail-composers.result }}\"\n\nFAILED=0\nfor job in \"${{\
        \ needs.guard-rail-dag.result }}\" \\\n           \"${{ needs.guard-rail-golden.result }}\" \\\n           \"${{ needs.guard-rail-config-drift.result\
        \ }}\" \\\n           \"${{ needs.guard-rail-3d.result }}\" \\\n           \"${{ needs.guard-rail-doc-links.result\
        \ }}\" \\\n           \"${{ needs.guard-rail-mypy.result }}\" \\\n           \"${{ needs.guard-rail-evolved.result }}\" \\\n           \"${{ needs.guard-rail-collection-count.result }}\" \\\n           \"${{ needs.guard-rail-composers.result }}\"; do\n  if [ \"$job\" = \"failure\" ] ||\
        \ [ \"$job\" = \"cancelled\" ]; then\n    FAILED=$((FAILED + 1))\n  fi\ndone\n\nif [ $FAILED -gt 0 ]; then\n  echo\
        \ \"❌ $FAILED guard rail(s) failed — blocking merge\"\n  exit 1\nfi\n\necho \"✓ All 9 guard rails passed\"\n"
